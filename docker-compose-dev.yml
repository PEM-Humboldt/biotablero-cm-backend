services:

  db:
    image: timescale/timescaledb-ha:pg17.5-ts2.21.1-oss
    container_name: bt-cm-db
    restart: "no"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - bt-search-network

  keycloak:
    image: keycloak/keycloak:26.3
    container_name: keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: bt-cm-db
      KC_DB_URL_DATABASE: ${DB_NAME}
      KC_DB_USERNAME: ${DB_USER}
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_HOSTNAME: localhost
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    restart: on-failure
    ports:
      - "8080:8080"
    command:
      - "start-dev"
      - "--import-realm"
      - "--verbose"
    volumes:
      - ./docker/keycloak/realm-dev:/opt/keycloak/data/import:ro
    depends_on:
      - db
    networks:
      - bt-search-network

volumes:
  db_data:

networks:
  bt-search-network:
    driver: bridge
